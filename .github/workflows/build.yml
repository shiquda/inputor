name: Build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore solution
        shell: pwsh
        run: dotnet restore inputor.sln

      - name: Build solution
        shell: pwsh
        run: dotnet build inputor.sln -c Release --no-restore
